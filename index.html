<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hanserq</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="manifest" href="./manifest.json">

  <meta name="description" content="Personal website — daily life, work, and everything in between." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ═══════════════ NAV ═══════════════ -->
<nav>
  <div class="nav-inner">
    <div class="nav-logo"></div>
    
    <div class="nav-right">
      <input type="text" id="search-input" placeholder="Search tagged posts..." class="search-bar" />
      <div class="nav-links">
        <a href="#feed">Posts</a>
        <a href="#portfolio">Work</a>
        <a href="#albums">Albums</a>
      </div>
    </div>
  </div>
</nav>

<!-- ═══════════════ MAIN ═══════════════ -->
<main>
  <div class="layout-container">
    
    <!-- LEFT: Albums (Desktop) -->
    <aside class="layout-left">
      <section id="albums-desktop">
        <div class="section-title" style="margin-top: 0">Albums</div>
        <div id="albums-container-left" class="albums-col">
          <div class="portfolio-empty">No albums yet.</div>
        </div>
      </section>
    </aside>

    <!-- CENTER: Profile + Posts -->
    <div class="layout-center">
      
      <!-- Profile Hero -->
      <section class="profile-hero">
        <div class="avatar" id="avatar-el">…</div>
        <div class="profile-info">
          <div class="profile-name" id="profile-name">Loading…</div>
          <div class="profile-tagline" id="profile-tagline"></div>
          <div class="profile-about" id="profile-about"></div>
        </div>
      </section>

      <!-- Shared Album Header for viewing specific albums -->
      <section id="album-view-header" style="display: none; border-bottom: 1px solid var(--border); padding-bottom: 2rem; margin-bottom: 2rem;">
         <button onclick="clearAlbumView()" class="like-btn" style="margin-bottom: 1rem; border: none; padding: 0;">← Back to timeline</button>
         <h2 id="album-view-title" style="font-size: 1.5rem; margin-bottom: 0.5rem; letter-spacing: -0.02em;"></h2>
         <p id="album-view-desc" style="color: var(--text-2); font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap;"></p>
      </section>

      <!-- Posts Feed -->
      <section id="feed">
        <div class="section-title" id="feed-title">Posts</div>
        <div id="empty-search" style="display: none;" class="loading">No posts found.</div>
        <div id="posts-container"></div>
        <div id="infinite-loader" class="loading">Loading more...</div>
      </section>
      
      <!-- MOBILE ONLY: Albums and Work revert to single column below posts -->
      <div class="mobile-sections">
        <section id="albums">
          <div class="section-title">Albums</div>
          <div id="albums-container-mobile" class="albums-grid"></div>
        </section>
        
        <section id="portfolio">
          <div class="section-title">Work</div>
          <div id="portfolio-container-mobile" class="portfolio-grid"></div>
        </section>
      </div>

    </div>

    <!-- RIGHT: Work (Desktop) -->
    <aside class="layout-right">
      <section id="portfolio-desktop">
        <div class="section-title" style="margin-top: 0">Work</div>
        <div id="portfolio-container-right" class="portfolio-col">
          <div class="portfolio-empty">No projects yet.</div>
        </div>
      </section>
    </aside>

  </div>
</main>

<footer id="footer-name">—</footer>

<!-- ═══════════════ POST DETAIL MODAL ═══════════════ -->
<div id="post-modal" class="modal">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-layout">
        <div class="modal-media-pane" id="modal-media"></div>
        <div class="modal-info-pane" id="modal-info"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
