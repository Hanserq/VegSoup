<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hanserq</title>
  <meta name="description" content="Personal website — daily life, work, and everything in between." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ═══════════════ NAV ═══════════════ -->
<nav>
  <div class="nav-inner">
    <div class="nav-logo"><span></span> <span id="nav-name">Loading…</span></div>
    
    <div class="nav-right">
      <input type="text" id="search-input" placeholder="Search tagged posts..." class="search-bar" />
      <div class="nav-links">
        <a href="#feed">Posts</a>
        <a href="#portfolio">Work</a>
        <a href="#albums">Series</a>
      </div>
    </div>
  </div>
</nav>

<!-- ═══════════════ MAIN ═══════════════ -->
<main>
  <!-- Profile Hero -->
  <section class="profile-hero">
    <div class="avatar" id="avatar-el">…</div>
    <div class="profile-info">
      <div class="profile-name" id="profile-name">Loading…</div>
      <div class="profile-tagline" id="profile-tagline"></div>
      <div class="profile-about" id="profile-about"></div>
    </div>
  </section>

  <!-- Posts Feed -->
  <section id="feed">
    <div class="section-title">Posts</div>
    <div id="empty-search" style="display: none;" class="loading">No posts match your search.</div>
    <div id="posts-container"><div class="loading">Loading posts…</div></div>
  </section>

  <!-- Portfolio -->
  <section id="portfolio">
    <div class="section-title">Work</div>
    <div id="portfolio-container" class="portfolio-grid">
      <div class="portfolio-empty">No projects yet.</div>
    </div>
  </section>

  <!-- Albums/Series -->
  <section id="albums">
    <div class="section-title">Series</div>
    <div id="albums-container" class="albums-grid">
      <div class="portfolio-empty" style="grid-column: 1/-1;">No series yet.</div>
    </div>
  </section>
</main>

<footer id="footer-name">—</footer>

<!-- ═══════════════ POST DETAIL MODAL ═══════════════ -->
<div id="post-modal" class="modal">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-layout">
        <div class="modal-media-pane" id="modal-media"></div>
        <div class="modal-info-pane" id="modal-info"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
