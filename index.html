<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hanserq</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="manifest" href="./manifest.json">

  <meta name="description" content="Personal website — daily life, work, and everything in between." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Matter.js Physics Engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Playground Physics Context -->
<div id="playground-overlay" class="playground-overlay">
  <div id="playground-canvas-container"></div>
  <div class="playground-timer-ui">
    <div class="timer-label">PLAYGROUND MODE ACTIVE</div>
    <div id="playground-countdown" class="timer-countdown">05:00</div>
    <button onclick="stopPlayground()" class="timer-exit-btn">EXIT CHEAT MODE</button>
  </div>
</div>

<div id="cheat-notification" class="cheat-notification">CHEAT ACTIVATED!</div>

<!-- ═══════════════ NAV ═══════════════ -->
<nav>
  <div class="nav-inner">
    <div class="nav-logo" id="nav-logo-link" onclick="navigateTo('home')" style="cursor:pointer;"></div>
    
    <div class="nav-right">
      <input type="text" id="search-input" placeholder="Search tagged posts..." class="search-bar" />
      <div class="nav-links">
        <a href="#" onclick="navigateTo('home'); return false;" id="nav-posts" class="nav-link-active">Posts</a>
        <a href="#" onclick="navigateTo('albums'); return false;" id="nav-albums">Albums</a>
        <a href="#" onclick="navigateTo('work'); return false;" id="nav-work">Work</a>
      </div>
    </div>
  </div>
</nav>

<!-- ═══════════════ MAIN ═══════════════ -->
<main>

  <!-- PAGE: Home / Posts (default) -->
  <div id="page-home" class="page-view">
    <!-- Profile Hero (Full width edge-to-edge) -->
    <section class="profile-hero" id="profile-hero">
      <!-- Cover image layer (sits behind avatar+info) -->
      <div class="profile-cover-layer" id="profile-cover-layer"></div>
      
      <!-- Inner container to keep content aligned with feed -->
      <div class="layout-container layout-single profile-hero-inner">
        <div class="avatar" id="avatar-el">…</div>
        <div class="profile-info">
          <div class="profile-name" id="profile-name">Loading…</div>
          <div class="profile-tagline" id="profile-tagline"></div>
          <div class="profile-about" id="profile-about"></div>
          


        </div>
      </div>
    </section>

    <!-- The rest of the page (Posts, Albums) stays constrained -->
    <div class="layout-container layout-single">


      <!-- Album view header (when an album is open) -->
      <section id="album-view-header" style="display: none; border-bottom: 1px solid var(--border); padding-bottom: 2rem; margin-bottom: 2rem;">
        <button onclick="clearAlbumView()" class="like-btn" style="margin-bottom: 1rem; border: none; padding: 0;">← Back to timeline</button>
        <h2 id="album-view-title" style="font-size: 1.5rem; margin-bottom: 0.5rem; letter-spacing: -0.02em;"></h2>
        <p id="album-view-desc" style="color: var(--text-2); font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap;"></p>
      </section>

      <!-- Posts Feed -->
      <section id="feed">
        <div class="section-title" id="feed-title">Posts</div>
        <div id="empty-search" style="display: none;" class="loading">No posts found.</div>
        <div id="posts-container"></div>
        <div id="infinite-loader" class="loading">Loading more...</div>
      </section>
    </div>
  </div>

  <!-- PAGE: Albums -->
  <div id="page-albums" class="page-view" style="display:none;">
    <div class="layout-container layout-single">
      <section>
        <div class="section-title" style="margin-top: 2rem;">Albums</div>
        <div id="albums-container-page" class="albums-grid"></div>
      </section>
    </div>
  </div>

  <!-- PAGE: Work -->
  <div id="page-work" class="page-view" style="display:none;">
    <div class="layout-container layout-single">
      <section>
        <div class="section-title" style="margin-top: 2rem;">Work</div>
        <div id="portfolio-container-page" class="portfolio-grid"></div>
        <div class="portfolio-empty" id="portfolio-empty-page" style="display:none;">No projects yet.</div>
      </section>
    </div>
  </div>

</main>

<footer id="footer-name">—</footer>

<!-- ═══════════════ POST DETAIL MODAL ═══════════════ -->
<div id="post-modal" class="modal">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-content" id="modal-content">
    <!-- Drag handle — visible on mobile only, swipe down here to dismiss -->
    <div class="modal-drag-handle" id="modal-drag-handle"></div>
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-layout">
        <div class="modal-media-pane" id="modal-media"></div>
        <div class="modal-info-pane" id="modal-info"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>

<!-- Mobile bottom nav (hidden on desktop) -->
<nav class="mobile-bottom-nav" id="mobile-bottom-nav">
  <button class="mob-tab active" id="mob-posts" onclick="navigateTo('home')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Posts</span>
  </button>
  <button class="mob-tab" id="mob-albums" onclick="navigateTo('albums')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    <span>Albums</span>
  </button>
  <button class="mob-tab" id="mob-work" onclick="navigateTo('work')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>Work</span>
  </button>
  <button class="mob-tab" id="mob-search" onclick="toggleMobileSearch()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Search</span>
  </button>
</nav>

<!-- Mobile search overlay -->
<div class="mobile-search-overlay" id="mobile-search-overlay" onclick="closeMobileSearch()">
  <div class="mobile-search-box" onclick="event.stopPropagation()">
    <input type="text" id="mobile-search-input" placeholder="Search posts..." autocomplete="off" />
    <button class="mobile-search-close" onclick="closeMobileSearch()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

</body>
</html>
